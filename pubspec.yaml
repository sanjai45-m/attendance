name: attendance
description: "Employee Attendance Management System"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5

  # State Management
  provider: ^6.1.2

  # Routing
  go_router: ^15.1.2

  # Excel Export
  syncfusion_flutter_xlsio: ^28.2.6

  # HTTP (Telegram)
  http: ^1.3.0

  # FCM v1 API auth
  googleapis_auth: ^1.6.0

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.5
  open_filex: ^4.6.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
